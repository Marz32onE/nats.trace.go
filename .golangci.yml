# golangci-lint config for natstrace
# https://golangci-lint.run/usage/configuration/
run:
  timeout: 5m
  modules-download-mode: readonly
  go: '1.24'

linters:
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  goimports:
    local-prefixes: github.com/Marz32onE/natstrace

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck  # tests may intentionally ignore errors
