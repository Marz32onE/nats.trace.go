# golangci-lint config for natstrace (v2 for action version: latest)
# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  go: '1.25'

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    goimports:
      local-prefixes: github.com/Marz32onE/natstrace
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck  # tests may intentionally ignore errors
